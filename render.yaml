services:
  - type: web
    name: airport-ai-assistant
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        scope: build
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    staticPublishPath: .
