<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airport AI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #1c3a70 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      height: 80vh;
      max-height: 700px;
    }

    .header {
      background: linear-gradient(135deg, #1c3a70 0%, #2563eb 100%);
      color: white;
      padding: 20px;
      border-radius: 16px 16px 0 0;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user .message-content {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .message-content {
      background: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #f3f4f6;
      border-radius: 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    .suggestions {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .suggestion-btn {
      padding: 8px 12px;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      color: #374151;
    }

    .suggestion-btn:hover {
      background: #e5e7eb;
      border-color: #2563eb;
      color: #2563eb;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 20px 0;
      font-size: 13px;
      border-left: 4px solid #dc2626;
    }

    /* Scrollbar styling */
    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>
      <span class="status-dot"></span>
      Airport Assistant
    </h1>
    <p>Powered by AI • Always Available</p>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="messages" id="messages"></div>

  <div id="error" class="error-message" style="display: none;"></div>

  <div class="input-area">
    <input 
      type="text" 
      id="input" 
      placeholder="Ask about flights, directions, services..."
      autocomplete="off"
    />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const API_ENDPOINT = process.env.API_ENDPOINT || '/api/chat';
  const messagesDiv = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const suggestionsDiv = document.getElementById('suggestions');
  const errorDiv = document.getElementById('error');

  const suggestions = [
    'Where is Terminal A?',
    'What time does my flight depart?',
    'Where is the nearest restaurant?',
    'How do I get to baggage claim?',
  ];

  // Initialize suggestions
  function initSuggestions() {
    suggestions.forEach(suggestion => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = suggestion;
      btn.onclick = () => {
        inputEl.value = suggestion;
        inputEl.focus();
        sendMessage();
      };
      suggestionsDiv.appendChild(btn);
    });
  }

  // Add initial greeting
  function initChat() {
    addMessage(
      "Hi! 👋 I'm the Airport Assistant. I can help you with wayfinding, flight information, airport services, and transportation options. What do you need help with?",
      'bot'
    );
  }

  // Handle Enter key
  inputEl.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    inputEl.focus();
    addMessage(message, 'user');

    sendBtn.disabled = true;
    inputEl.disabled = true;
    errorDiv.style.display = 'none';

    showTyping();

    try {
      // Try to use backend API if available, otherwise use direct API
      let response;
      
      try {
        // First try local backend
        response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message }),
        });
      } catch {
        // Fallback to direct Anthropic API
        response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': window.ANTHROPIC_API_KEY || '',
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 300,
            system: `You are a helpful airport assistant chatbot. You help passengers with:
- Wayfinding and terminal/gate directions
- Flight information and status
- Airport services and facilities
- Ground transportation options

Keep responses brief, friendly, and practical. If asked something outside your scope, offer to escalate to a human agent.`,
            messages: [{ role: 'user', content: message }],
          }),
        });
      }

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      const botMessage = data.reply || data.content?.[0]?.text || 'Sorry, I could not process that request.';

      setTimeout(() => {
        removeTyping();
        addMessage(botMessage, 'bot');
      }, 300);
    } catch (error) {
      console.error('Error:', error);
      removeTyping();
      showError('Unable to connect. Please check your API key or internet connection.');
    } finally {
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  function addMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender}`;

    const content = document.createElement('div');
    content.className = 'message-content';
    content.textContent = text;

    msgDiv.appendChild(content);
    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function showTyping() {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message bot';
    msgDiv.id = 'typing';

    const typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    msgDiv.appendChild(typing);
    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
  }

  function showError(message) {
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    initSuggestions();
    initChat();
  });
</script>

</body>
</html>
